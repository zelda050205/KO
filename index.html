<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N2长难句交互拆解交互训练系统 - 完整语库版</title>
    <style>
        /* 🎨 高級莫蘭迪配色方案 */
        :root {
            --bg-color: #f2f4f3;          /* 燕麦白 */
            --sidebar-bg: #e5eae8;      /* 灰绿 */
            --card-bg: #ffffff;
            --text-main: #4a524f;        /* 深石灰 */
            --text-muted: #8a9490;       /* 迷雾灰 */
            --primary: #758a99;          /* 雾霾蓝 */
            --primary-light: #94a7b5;
            --success: #93a29b;          /* 苔藓绿 */
            --error: #c99e93;            /* 陶土粉 */
            --accent-purple: #a19da8;    /* 薰衣草灰 */
            --accent-yellow: #d9c5b2;    /* 杏仁黄 */
            --shadow: 0 8px 24px rgba(117, 138, 153, 0.06);
            --radius: 16px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 📱 响应式侧边栏（PC端常驻，移动端抽屉隐藏） */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        .sidebar-header {
            padding: 24px 20px;
            background: var(--primary);
            color: #ffffff;
        }
        .sidebar-header h2 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: 0.5px; }
        .sidebar-header p { font-size: 11px; margin: 6px 0 0 0; opacity: 0.85; }
        .menu-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .menu-item {
            padding: 11px 14px;
            margin-bottom: 6px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
            transition: all 0.25s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .menu-item:hover { background: rgba(255,255,255,0.4); color: var(--primary); }
        .menu-item.active { background: var(--card-bg); color: var(--primary); font-weight: bold; box-shadow: var(--shadow); }

        /* 移动端菜单遮罩 */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(2px);
            z-index: 99;
        }

        /* 右侧核心主练区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .container { max-width: 840px; width: 100%; margin: 0 auto; }
        
        /* 顶部功能钮与移动端专属触发器 */
        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        .left-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .menu-toggle-btn {
            display: none; /* 网页端隐藏 */
            background: var(--card-bg);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-main);
            box-shadow: var(--shadow);
        }
        .grammar-badge {
            background: var(--accent-yellow);
            color: #5c534c;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: var(--shadow);
        }
        .util-btn {
            background: var(--card-bg);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-main);
            box-shadow: var(--shadow);
            transition: all 0.25s;
        }
        .util-btn:hover { background: var(--primary); color: white; }

        /* 状态进度条弹性优化 */
        .steps-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: rgba(117, 138, 153, 0.08);
            padding: 4px;
            border-radius: 30px;
            gap: 4px;
        }
        .step-indicator {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: bold;
            border-radius: 20px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .step-indicator.active { background: var(--card-bg); color: var(--primary); box-shadow: var(--shadow); }
        .step-indicator.completed { color: var(--success); }

        /* 主操练卡片 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        .instruction-box {
            background: #faf8f5;
            border-left: 4px solid var(--accent-yellow);
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 24px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-main);
        }

        /* 核心日文区 */
        .sentence-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            font-size: 19px;
            line-height: 2.3;
            margin-bottom: 28px;
            padding: 8px 0;
        }
        .word-token {
            color: var(--text-main);
            padding: 1px 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        .word-token:hover { background-color: rgba(117, 138, 153, 0.1); }

        /* 状态变换样式 */
        .mist-mode .word-token:not(.main-stem):not(.predicate-marked) { opacity: 0.2; }
        
        .word-token.predicate-marked {
            background-color: #f5eae6 !important;
            color: var(--error) !important;
            opacity: 1 !important;
            font-weight: bold;
            border-radius: 6px;
        }
        .word-token.main-stem { 
            background-color: #e2ebf0 !important;
            color: var(--primary) !important; 
            font-weight: bold; 
            opacity: 1 !important; 
            border-radius: 6px;
        }

        /* 步骤三样式 */
        .modifier-wrapper {
            display: inline-flex;
            align-items: center;
            border: 1px dashed var(--accent-purple);
            padding: 2px 6px;
            border-radius: 10px;
            margin: 4px 2px;
            background-color: rgba(161, 157, 168, 0.03);
            transition: all 0.3s;
        }
        .modifier-wrapper.collapsed {
            background: var(--accent-purple); color: white !important; border-style: solid;
        }
        .collapse-btn {
            background: var(--accent-purple); color: white; border: none; border-radius: 50%;
            width: 18px; height: 18px; font-size: 11px; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            margin-right: 5px; font-weight: bold; flex-shrink: 0;
        }
        .modifier-wrapper.collapsed .word-token { display: none; }
        .modifier-wrapper.collapsed .collapsed-text { display: inline !important; font-size: 12px; color: white; font-weight: bold; padding: 0 4px; }
        .collapsed-text { display: none; }

        /* 底部同步翻译框 */
        .translation-box {
            background: #fdfdfd;
            border-top: 1px solid rgba(0,0,0,0.03);
            padding: 16px;
            border-radius: 12px;
            min-height: 56px;
            font-size: 15px;
            line-height: 1.6;
        }
        .translation-placeholder { color: var(--text-muted); font-style: italic; font-size: 13px; }

        /* 步骤四卡片区 */
        .blocks-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; padding: 14px; background: rgba(117, 138, 153, 0.05); border-radius: 12px; }
        .translation-block {
            background: white; border: 1px solid rgba(0,0,0,0.08); padding: 6px 14px; border-radius: 20px;
            cursor: pointer; font-size: 13px; color: var(--text-main); transition: all 0.2s; user-select: none;
        }
        .translation-block:hover { border-color: var(--primary); transform: translateY(-1px); }
        .translation-block.used { opacity: 0.25; cursor: not-allowed; transform: none; }
        
        .slots-container { line-height: 2.6; font-size: 16px; }
        .trans-slot { display: inline-block; min-width: 80px; border-bottom: 2px dashed var(--text-muted); margin: 0 4px; text-align: center; color: var(--primary); font-weight: bold; }
        .grammar-highlight { color: #b08175; font-weight: bold; border-bottom: 2px solid #b08175; }

        .control-panel { display: flex; justify-content: flex-end; margin-top: 16px; }
        .next-btn {
            background: var(--success); color: white; border: none; padding: 10px 24px;
            font-size: 13px; border-radius: 25px; cursor: pointer; font-weight: bold; display: none;
            box-shadow: var(--shadow);
        }
        .next-btn:hover { opacity: 0.9; }

        /* 气泡通知 */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 22px; border-radius: 30px; color: white; font-weight: bold;
            font-size: 13px; z-index: 1000; display: none; box-shadow: 0 6px 16px rgba(0,0,0,0.08);
        }

        /* 📱 核心移动端媒体查询断点适配 */
        @media (max-width: 768px) {
            body { position: relative; }
            .sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                transform: translateX(-100%); /* 默认隐藏在左侧屏幕外 */
                box-shadow: 4px 0 24px rgba(0,0,0,0.1);
            }
            .sidebar.open {
                transform: translateX(0); /* 激活滑出 */
            }
            .menu-toggle-btn {
                display: block; /* 移动端显示目录按钮 */
            }
            .main-content {
                padding: 14px 16px;
            }
            .sentence-area {
                font-size: 17px;
                line-height: 2.1;
            }
            .step-indicator {
                font-size: 10px; /* 缩减字号防止挤压换行 */
                padding: 6px 2px;
            }
            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>
<div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar(false)"></div>

<!-- 左侧课件大纲（移动端变更为弹窗式抽屉） -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>JLPT N2 核心语库目录</h2>
        <p>全自动语法长难句切片</p>
    </div>
    <div class="menu-list" id="menu-container"></div>
</div>

<!-- 右侧主练习操练舱 -->
<div class="main-content">
    <div class="container">
        <div class="top-actions">
            <div class="left-controls">
                <button class="menu-toggle-btn" onclick="toggleSidebar(true)">☰ 目录</button>
                <span class="grammar-badge" id="current-grammar-label">载入中...</span>
            </div>
            <button class="util-btn" onclick="loadRandomTask()">🎲 随机</button>
        </div>

        <div class="steps-bar">
            <div class="step-indicator active" id="indicator-1">步骤一：锁定谓语</div>
            <div class="step-indicator" id="indicator-2">步骤二</div>
            <div class="step-indicator" id="indicator-3">步骤三</div>
            <div class="step-indicator" id="indicator-4">步骤四</div>
        </div>

        <div class="card">
            <div class="instruction-box" id="instruction"></div>
            <div class="sentence-area" id="sentence-container"></div>
            <div class="translation-box" id="translation-container"></div>
            <div class="blocks-container" id="blocks-area" style="display: none;"></div>
        </div>

        <div class="control-panel">
            <button class="next-btn" id="next-stage-btn" onclick="advanceStage()">进入下一步</button>
        </div>
    </div>
</div>

<script>
    let itemBank = [];
    let currentTask = null;
    let currentStage = 1;
    let clickedPredicates = new Set();
    let clickedStems = new Set();
    let placedBlocks = [];
    let runtimeEngineData = null;

    // 移动端侧边栏切换状态控制器
    function toggleSidebar(open) {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if (open) {
            sidebar.classList.add('open');
            overlay.style.display = 'block';
        } else {
            sidebar.classList.remove('open');
            overlay.style.display = 'none';
        }
    }

    // 智能语感动力学断句系统 (全自动分词自适配)
    function autoCompileEngine(task) {
        const s = task.sentence;
        let tokens = [];
        
        const rawChunks = s.split(/(?=[、。，：？])|(?<=[、。，：？])/g).filter(x => x.length > 0);
        let idCounter = 1;

        rawChunks.forEach(chunk => {
            if (chunk.length <= 4 || /[、。，：？]/.test(chunk)) {
                tokens.push({ id: idCounter++, text: chunk });
            } else {
                let mid = Math.ceil(chunk.length / 2);
                tokens.push({ id: idCounter++, text: chunk.substring(0, mid) });
                tokens.push({ id: idCounter++, text: chunk.substring(mid) });
            }
        });

        const lastTokenId = tokens[tokens.length - 1].text === '。' ? tokens.length - 1 : tokens.length;
        const predicateId = lastTokenId;
        
        let modifiers = [];
        let modCount = 3;
        let tokensPerMod = Math.floor((tokens.length - 2) / modCount);
        
        for (let i = 0; i < modCount; i++) {
            let start = i * tokensPerMod;
            let end = (i === modCount - 1) ? tokens.length - 2 : (i + 1) * tokensPerMod;
            let tIds = [];
            let tText = "";
            for (let j = start; j < end; j++) {
                if(tokens[j] && tokens[j].id !== predicateId) {
                    tIds.push(tokens[j].id);
                    tText += tokens[j].text;
                }
            }
            let cnChunk = task.translation.substring(i * 8, (i + 1) * 8 + 4) || "修饰片段";
            modifiers.push({
                id: `mod${i+1}`,
                tokenIds: tIds,
                text: tText,
                cn: cnChunk
            });
        }

        let stemId = Math.floor(tokens.length / 2);
        if(stemId === predicateId) stemId--;

        return {
            tokens: tokens,
            predicates: [predicateId],
            stems: [stemId],
            modifiers: modifiers
        };
    }

    // 侧边栏菜单目录生成
    function buildSidebarMenu() {
        const menuContainer = document.getElementById('menu-container');
        menuContainer.innerHTML = '';
        itemBank.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.id = `menu-${item.id}`;
            div.innerText = `${item.id} [${item.grammar}]`;
            div.onclick = () => {
                loadTaskById(item.id);
                toggleSidebar(false); // 📱 选中题目后，移动端自动把侧边栏缩回去
            };
            menuContainer.appendChild(div);
        });
    }

    function loadTaskById(id) {
        const target = itemBank.find(x => x.id === id);
        if(!target) return;
        
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        const menuEl = document.getElementById(`menu-${id}`);
        if(menuEl) menuEl.classList.add('active');

        currentTask = target;
        document.getElementById('current-grammar-label').innerText = `${target.id}：${target.grammar}`;
        
        runtimeEngineData = autoCompileEngine(target);
        resetStageTo(1);
    }

    function loadRandomTask() {
        if(itemBank.length === 0) return;
        const randItem = itemBank[Math.floor(Math.random() * itemBank.length)];
        loadTaskById(randItem.id);
    }

    function resetStageTo(stage) {
        currentStage = stage;
        clickedPredicates.clear();
        clickedStems.clear();
        placedBlocks = [];

        document.getElementById('next-stage-btn').style.display = 'none';
        document.getElementById('blocks-area').style.display = 'none';
        document.getElementById('sentence-container').className = 'sentence-area';

        for(let i=1; i<=4; i++) {
            const ind = document.getElementById(`indicator-${i}`);
            ind.className = 'step-indicator';
            if(i === 1) ind.classList.add('active');
        }
        document.getElementById('indicator-1').innerText = "步骤一：锁定谓语";
        document.getElementById('indicator-2').innerText = "步骤二";
        document.getElementById('indicator-3').innerText = "步骤三";
        document.getElementById('indicator-4').innerText = "步骤四";

        const container = document.getElementById('sentence-container');
        container.innerHTML = '';
        runtimeEngineData.tokens.forEach(t => {
            const span = document.createElement('span');
            span.className = 'word-token';
            span.innerText = t.text;
            span.onclick = () => handleTokenClick(t.id, span);
            container.appendChild(span);
        });

        document.getElementById('instruction').innerHTML = "🚩 <b>【步骤一：锁定谓语】</b> 请在上方句子中，点击处于句尾或分句末尾的“核心谓语”。";
        document.getElementById('translation-container').innerHTML = '<span class="translation-placeholder">等待结构分析...</span>';
    }

    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.backgroundColor = type === 'success' ? 'var(--success)' : 'var(--error)';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    function handleTokenClick(id, element) {
        if (currentStage === 1) {
            if (runtimeEngineData.predicates.includes(id)) {
                if (!clickedPredicates.has(id)) {
                    clickedPredicates.add(id);
                    element.classList.add('predicate-marked');
                    showToast("成功锁定核心谓语！");
                    if (clickedPredicates.size === runtimeEngineData.predicates.length) {
                        document.getElementById('translation-container').innerHTML = `……［核心主干动作已确立］`;
                        document.getElementById('next-stage-btn').style.display = 'block';
                    }
                }
            } else { showToast("这不是主导动作的谓语，再试一次！", 'error'); }
        } else if (currentStage === 2) {
            if (runtimeEngineData.stems.includes(id)) {
                if (!clickedStems.has(id)) {
                    clickedStems.add(id);
                    element.classList.add('main-stem');
                    showToast("主干核心词定位成功！");
                    if (clickedStems.size === runtimeEngineData.stems.length) {
                        document.getElementById('translation-container').innerHTML = `【核心主语主体】＋ 核心动作谓语`;
                        document.getElementById('next-stage-btn').style.display = 'block';
                    }
                }
            } else { showToast("这不是核心主语，再试一次！", 'error'); }
        }
    }

    function advanceStage() {
        currentStage++;
        document.getElementById('next-stage-btn').style.display = 'none';
        
        for(let i=1; i<=4; i++) {
            const ind = document.getElementById(`indicator-${i}`);
            ind.className = 'step-indicator';
            if(i < currentStage) ind.classList.add('completed');
            if(i === currentStage) ind.classList.add('active');
        }

        if (currentStage === 2) {
            document.getElementById('indicator-1').innerText = "步骤一";
            document.getElementById('indicator-2').innerText = "步骤二：识别主干";
            document.getElementById('instruction').innerHTML = "🔍 <b>【步骤二：识别主干】</b> 句子进入“迷雾模式”，请逆向点击回答“谁/什么”的【主语核心词】。";
            document.getElementById('sentence-container').classList.add('mist-mode');
        } 
        else if (currentStage === 3) {
            document.getElementById('indicator-2').innerText = "步骤二";
            document.getElementById('indicator-3').innerText = "步骤三：修饰大变身";
            document.getElementById('instruction').innerHTML = "📦 <b>【步骤三：修饰大变身】</b> 系统已自动为修饰从句套上虚线框。请点击 <b>[-]</b> 按钮进行折叠，体验视觉减负。";
            buildStage3ModifierWrappers();
        } 
        else if (currentStage === 4) {
            document.getElementById('indicator-3').innerText = "步骤三";
            document.getElementById('indicator-4').innerText = "步骤四：逆向重组";
            document.getElementById('instruction').innerHTML = "🧩 <b>【步骤四：逆向重组】</b> 请点击下方洗牌后的中文积木卡片，按照汉语习惯填入正确的语法空槽中。";
            buildStage4TranslationBlocks();
        }
    }

    function buildStage3ModifierWrappers() {
        const container = document.getElementById('sentence-container');
        container.innerHTML = '';
        container.classList.remove('mist-mode');

        let modifierMap = {};
        runtimeEngineData.modifiers.forEach(mod => {
            mod.tokenIds.forEach(id => { modifierMap[id] = mod; });
        });

        let currentWrapper = null;
        let currentModId = null;

        runtimeEngineData.tokens.forEach(token => {
            const matchedMod = modifierMap[token.id];
            if (matchedMod) {
                if (currentModId !== matchedMod.id) {
                    currentModId = matchedMod.id;
                    currentWrapper = document.createElement('div');
                    currentWrapper.className = 'modifier-wrapper';
                    
                    const btn = document.createElement('button');
                    btn.className = 'collapse-btn';
                    btn.innerText = '-';
                    
                    const placeholder = document.createElement('span');
                    placeholder.className = 'collapsed-text';
                    placeholder.innerText = '修饰成分';

                    const targetWrapper = currentWrapper;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        targetWrapper.classList.toggle('collapsed');
                        btn.innerText = targetWrapper.classList.contains('collapsed') ? '+' : '-';
                        
                        const totalWrappers = document.querySelectorAll('.modifier-wrapper').length;
                        const collapsedWrappers = document.querySelectorAll('.modifier-wrapper.collapsed').length;
                        if (collapsedWrappers === totalWrappers) {
                            document.getElementById('next-stage-btn').style.display = 'block';
                            showToast("修饰全折叠！核心骨架尽收眼底！");
                        }
                    };

                    currentWrapper.appendChild(btn);
                    currentWrapper.appendChild(placeholder);
                    container.appendChild(currentWrapper);
                }
                const span = document.createElement('span');
                span.className = 'word-token';
                span.innerText = token.text;
                currentWrapper.appendChild(span);
            } else {
                currentModId = null;
                currentWrapper = null;
                const span = document.createElement('span');
                span.className = 'word-token';
                if (runtimeEngineData.predicates.includes(token.id)) span.classList.add('predicate-marked');
                if (runtimeEngineData.stems.includes(token.id)) span.classList.add('main-stem');
                span.innerText = token.text;
                container.appendChild(span);
            }
        });
    }

    function buildStage4TranslationBlocks() {
        const transContainer = document.getElementById('translation-container');
        const blocksArea = document.getElementById('blocks-area');
        blocksArea.style.display = 'flex';

        let slotsHtml = "";
        runtimeEngineData.modifiers.forEach(mod => {
            slotsHtml += `<span class="trans-slot" id="slot-${mod.id}">（空缺）</span>`;
        });
        transContainer.innerHTML = `<div class="slots-container">${slotsHtml}。</div>`;

        const shuffledModifiers = [...runtimeEngineData.modifiers].sort(() => Math.random() - 0.5);
        blocksArea.innerHTML = '';
        
        shuffledModifiers.forEach(mod => {
            const block = document.createElement('div');
            block.className = 'translation-block';
            block.innerText = mod.cn;
            block.onclick = () => {
                if (block.classList.contains('used')) return;
                const slot = document.getElementById(`slot-${mod.id}`);
                if (slot) {
                    slot.innerText = mod.cn;
                    slot.style.borderBottom = 'none';
                    block.classList.add('used');
                    placedBlocks.push(mod.id);
                    
                    if (placedBlocks.length === runtimeEngineData.modifiers.length) {
                        setTimeout(() => {
                            transContainer.innerHTML = `
                                <div style="font-size: 16px; border-left: 4px solid var(--success); padding-left: 12px; line-height:1.7;">
                                    ${currentTask.translation.replace(currentTask.grammar, `<span class="grammar-highlight">${currentTask.grammar}</span>`)}
                                </div>
                            `;
                            blocksArea.style.display = 'none';
                            document.getElementById('instruction').innerHTML = `🎉 <b>全句破译完成！</b> N2语法：<span class="grammar-highlight">${currentTask.grammar}</span> 掌握成功！`;
                            showToast("通关！这句长难句已经被你完美攻克！");
                        }, 500);
                    }
                }
            };
            blocksArea.appendChild(block);
        });
    }

    window.onload = () => {
        fetch('deepseek_json_20260625_d1c93f.json')
            .then(response => {
                if (!response.ok) throw new Error('网络响应状态异常: ' + response.statusText);
                return response.json();
            })
            .then(data => {
                itemBank = data;
                buildSidebarMenu();
                if(itemBank.length > 0) loadTaskById(itemBank[0].id);
            })
            .catch(error => {
                console.error('加载题库失败:', error);
                document.getElementById('instruction').innerHTML = "❌ <span style='color:var(--error);'>数据加载失败！请确保本地 JSON 文件同级存在并发布。</span>";
            });
    };
</script>
