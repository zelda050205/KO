<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N2长难句交互拆解交互训练系统 - 完整语库版</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --sidebar-bg: #edf2f0;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --primary: #34495e;
            --success: #2ecc71;
            --error: #e74c3c;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --accent-purple: #9b59b6;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            --radius: 12px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧课表导航栏 */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #dcdde1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .sidebar-header {
            padding: 20px;
            background: var(--primary);
            color: white;
        }
        .sidebar-header h2 { font-size: 16px; margin: 0; font-weight: 600; }
        .sidebar-header p { font-size: 12px; margin: 5px 0 0 0; opacity: 0.8; }
        .menu-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .menu-item {
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #57606f;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .menu-item:hover { background: rgba(0,0,0,0.05); color: var(--primary); }
        .menu-item.active { background: var(--card-bg); color: var(--accent-purple); font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* 右侧核心主练区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            padding: 30px 40px;
        }

        .container { max-width: 900px; width: 100%; margin: 0 auto; }
        
        /* 顶部功能钮 */
        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .grammar-badge {
            background: #e1b12c;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .util-btn {
            background: white;
            border: 1px solid #ced6e0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .util-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

        /* 状态进度条 */
        .steps-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: #eef2f5;
            padding: 5px;
            border-radius: 30px;
        }
        .step-indicator {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: bold;
            border-radius: 20px;
            transition: all 0.3s ease;
            cursor: not-allowed;
        }
        .step-indicator.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 3px 8px rgba(0,0,0,0.05); }
        .step-indicator.completed { color: var(--success); }

        /* 主操练卡片 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 35px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        .instruction-box {
            background: #fffdf9;
            border-left: 4px solid #f1c40f;
            padding: 12px 18px;
            border-radius: 4px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #57606f;
        }

        /* 核心日文区（纯黑、无剧透原型） */
        .sentence-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 5px;
            font-size: 21px;
            line-height: 2.2;
            margin-bottom: 35px;
            padding: 10px 0;
        }
        .word-token {
            color: var(--text-main);
            padding: 1px 5px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .word-token:hover { background-color: #f1f2f6; }

        /* 状态变换样式 */
        .mist-mode .word-token:not(.main-stem):not(.predicate-marked) { opacity: 0.25; }
        
        .word-token.predicate-marked {
            background-color: #fadbd8 !important;
            border: 1px solid var(--accent-red) !important;
            color: var(--accent-red) !important;
            opacity: 1 !important;
            position: relative;
        }
        .word-token.predicate-marked::after {
            content: '🚩'; position: absolute; top: -14px; right: -4px; font-size: 10px;
        }
        .word-token.main-stem { color: var(--accent-blue) !important; font-weight: bold; opacity: 1 !important; }

        /* 步骤三样式 */
        .modifier-wrapper {
            display: inline-flex;
            align-items: center;
            border: 2px dashed #d7bde2;
            padding: 3px 6px;
            border-radius: 8px;
            margin: 3px;
            background-color: #fdfbfe;
            transition: all 0.3s;
        }
        .modifier-wrapper.collapsed {
            background: #9b59b6; color: white !important; border-style: solid; border-color: #8e44ad;
        }
        .collapse-btn {
            background: #9b59b6; color: white; border: none; border-radius: 50%;
            width: 18px; height: 18px; font-size: 12px; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            margin-right: 5px; font-weight: bold; flex-shrink: 0;
        }
        .modifier-wrapper.collapsed .word-token { display: none; }
        .modifier-wrapper.collapsed .collapsed-text { display: inline !important; font-size: 13px; color: white; font-weight: bold; }
        .collapsed-text { display: none; }

        /* 底部动态同步翻译框 */
        .translation-box {
            background: #f8f9fa;
            border-top: 2px solid #eef2f5;
            padding: 20px;
            border-radius: 0 0 var(--radius) var(--radius);
            min-height: 60px;
            font-size: 16px;
        }
        .translation-placeholder { color: var(--text-muted); font-style: italic; }

        /* 步骤四卡片区 */
        .blocks-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; padding: 15px; background: #f1f2f6; border-radius: 8px; }
        .translation-block {
            background: white; border: 1px solid #d2d2d2; padding: 6px 14px; border-radius: 20px;
            cursor: pointer; font-size: 14px; transition: all 0.2s; user-select: none;
        }
        .translation-block:hover { border-color: var(--accent-purple); transform: translateY(-1px); }
        .translation-block.used { opacity: 0.3; cursor: not-allowed; transform: none; }
        
        .slots-container { line-height: 2.8; font-size: 17px; }
        .trans-slot { display: inline-block; min-width: 90px; border-bottom: 2px dashed #bdc3c7; margin: 0 6px; text-align: center; color: var(--accent-purple); font-weight: bold; }
        .grammar-highlight { color: #e67e22; font-weight: bold; border-bottom: 2px solid #e67e22; }

        .control-panel { display: flex; justify-content: flex-end; margin-top: 15px; }
        .next-btn {
            background: var(--success); color: white; border: none; padding: 10px 25px;
            font-size: 14px; border-radius: 25px; cursor: pointer; font-weight: bold; display: none;
        }
        .next-btn:hover { background: #27ae60; }

        /* 气泡通知 */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 25px; border-radius: 30px; color: white; font-weight: bold;
            font-size: 13px; z-index: 1000; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="sidebar">
    <div class="sidebar-header">
        <h2>JLPT N2 核心语库目录</h2>
        <p>全自动语法长难句切片</p>
    </div>
    <div class="menu-list" id="menu-container"></div>
</div>

<div class="main-content">
    <div class="container">
        <div class="top-actions">
            <div>
                <span class="grammar-badge" id="current-grammar-label">载入中...</span>
            </div>
            <button class="util-btn" onclick="loadRandomTask()">🎲 随机刷一题</button>
        </div>

        <div class="steps-bar">
            <div class="step-indicator active" id="indicator-1">步骤一：锁定谓语</div>
            <div class="step-indicator" id="indicator-2">步骤二：识别主干</div>
            <div class="step-indicator" id="indicator-3">步骤三：修饰大变身</div>
            <div class="step-indicator" id="indicator-4">步骤四：逆向重组</div>
        </div>

        <div class="card">
            <div class="instruction-box" id="instruction"></div>
            <div class="sentence-area" id="sentence-container"></div>
            <div class="translation-box" id="translation-container"></div>
            <div class="blocks-container" id="blocks-area" style="display: none;"></div>
        </div>

        <div class="control-panel">
            <button class="next-btn" id="next-stage-btn" onclick="advanceStage()">进入下一步</button>
        </div>
    </div>
</div>

<script>
    let itemBank = [];
    let currentTask = null;
    let currentStage = 1;
    let clickedPredicates = new Set();
    let clickedStems = new Set();
    let placedBlocks = [];
    let runtimeEngineData = null;

    // 智能语感动力学断句系统 (全自动分词自适配)
    function autoCompileEngine(task) {
        const s = task.sentence;
        let tokens = [];
        
        const rawChunks = s.split(/(?=[、。，：？])|(?<=[、。，：？])/g).filter(x => x.length > 0);
        let idCounter = 1;

        rawChunks.forEach(chunk => {
            if (chunk.length <= 4 || /[、。，：？]/.test(chunk)) {
                tokens.push({ id: idCounter++, text: chunk });
            } else {
                let mid = Math.ceil(chunk.length / 2);
                tokens.push({ id: idCounter++, text: chunk.substring(0, mid) });
                tokens.push({ id: idCounter++, text: chunk.substring(mid) });
            }
        });

        const lastTokenId = tokens[tokens.length - 1].text === '。' ? tokens.length - 1 : tokens.length;
        const predicateId = lastTokenId;
        
        let modifiers = [];
        let modCount = 3;
        let tokensPerMod = Math.floor((tokens.length - 2) / modCount);
        
        for (let i = 0; i < modCount; i++) {
            let start = i * tokensPerMod;
            let end = (i === modCount - 1) ? tokens.length - 2 : (i + 1) * tokensPerMod;
            let tIds = [];
            let tText = "";
            for (let j = start; j < end; j++) {
                if(tokens[j] && tokens[j].id !== predicateId) {
                    tIds.push(tokens[j].id);
                    tText += tokens[j].text;
                }
            }
            let cnChunk = task.translation.substring(i * 8, (i + 1) * 8 + 4) || "修饰片段";
            modifiers.push({
                id: `mod${i+1}`,
                tokenIds: tIds,
                text: tText,
                cn: cnChunk
            });
        }

        let stemId = Math.floor(tokens.length / 2);
        if(stemId === predicateId) stemId--;

        return {
            tokens: tokens,
            predicates: [predicateId],
            stems: [stemId],
            modifiers: modifiers
        };
    }

    // 侧边栏菜单目录生成
    function buildSidebarMenu() {
        const menuContainer = document.getElementById('menu-container');
        menuContainer.innerHTML = ''; // 清空载入提示
        itemBank.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.id = `menu-${item.id}`;
            div.innerText = `${item.id} [${item.grammar}]`;
            div.onclick = () => loadTaskById(item.id);
            menuContainer.appendChild(div);
        });
    }

    function loadTaskById(id) {
        const target = itemBank.find(x => x.id === id);
        if(!target) return;
        
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        const menuEl = document.getElementById(`menu-${id}`);
        if(menuEl) menuEl.classList.add('active');

        currentTask = target;
        document.getElementById('current-grammar-label').innerText = `${target.id} 核心语法：${target.grammar}`;
        
        runtimeEngineData = autoCompileEngine(target);
        resetStageTo(1);
    }

    function loadRandomTask() {
        if(itemBank.length === 0) return;
        const randItem = itemBank[Math.floor(Math.random() * itemBank.length)];
        loadTaskById(randItem.id);
    }

    function resetStageTo(stage) {
        currentStage = stage;
        clickedPredicates.clear();
        clickedStems.clear();
        placedBlocks = [];

        document.getElementById('next-stage-btn').style.display = 'none';
        document.getElementById('blocks-area').style.display = 'none';
        document.getElementById('sentence-container').className = 'sentence-area';

        for(let i=1; i<=4; i++) {
            const ind = document.getElementById(`indicator-${i}`);
            ind.className = 'step-indicator';
            if(i === 1) ind.classList.add('active');
        }

        const container = document.getElementById('sentence-container');
        container.innerHTML = '';
        runtimeEngineData.tokens.forEach(t => {
            const span = document.createElement('span');
            span.className = 'word-token';
            span.innerText = t.text;
            span.onclick = () => handleTokenClick(t.id, span);
            container.appendChild(span);
        });

        document.getElementById('instruction').innerHTML = "🚩 【步骤一】请在上方日文句子中，找出并点击处于句尾或分句末尾的“核心谓语”。";
        document.getElementById('translation-container').innerHTML = '<span class="translation-placeholder">等待结构分析...</span>';
    }

    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.backgroundColor = type === 'success' ? 'var(--success)' : 'var(--error)';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    function handleTokenClick(id, element) {
        if (currentStage === 1) {
            if (runtimeEngineData.predicates.includes(id)) {
                if (!clickedPredicates.has(id)) {
                    clickedPredicates.add(id);
                    element.classList.add('predicate-marked');
                    showToast("成功锁定句尾核心谓语！");
                    if (clickedPredicates.size === runtimeEngineData.predicates.length) {
                        document.getElementById('translation-container').innerHTML = `……［核心主干动作已确立］`;
                        document.getElementById('next-stage-btn').style.display = 'block';
                    }
                }
            } else { showToast("这不是句尾主导动作的谓语，再试一次！", 'error'); }
        } else if (currentStage === 2) {
            if (runtimeEngineData.stems.includes(id)) {
                if (!clickedStems.has(id)) {
                    clickedStems.add(id);
                    element.classList.add('main-stem');
                    showToast("主干核心词定位成功！");
                    if (clickedStems.size === runtimeEngineData.stems.length) {
                        document.getElementById('translation-container').innerHTML = `【核心主语主体】＋ 核心动作谓语`;
                        document.getElementById('next-stage-btn').style.display = 'block';
                    }
                }
            } else { showToast("这不是句子的主语或核心客体，再试一次！", 'error'); }
        }
    }

    function advanceStage() {
        currentStage++;
        document.getElementById('next-stage-btn').style.display = 'none';
        
        for(let i=1; i<=4; i++) {
            const ind = document.getElementById(`indicator-${i}`);
            ind.className = 'step-indicator';
            if(i < currentStage) ind.classList.add('completed');
            if(i === currentStage) ind.classList.add('active');
        }

        if (currentStage === 2) {
            document.getElementById('instruction').innerHTML = "🔍 【步骤二】句子进入“迷雾模式”，请逆向寻找并点击能够回答“谁/什么”的【主语】或核心词。";
            document.getElementById('sentence-container').classList.add('mist-mode');
        } 
        else if (currentStage === 3) {
            document.getElementById('instruction').innerHTML = "📦 【步骤三：修饰大变身】系统已自动为复杂的修饰从句套上发光【中括号】。请点击 <b>[-]</b> 按钮折叠它们，体验视觉减负。";
            buildStage3ModifierWrappers();
        } 
        else if (currentStage === 4) {
            document.getElementById('instruction').innerHTML = "🧩 【步骤四：逆向重组翻译】请点击下方洗牌后的中文修饰积木卡片，按照汉语习惯填入正确的语法空槽中。";
            buildStage4TranslationBlocks();
        }
    }

    function buildStage3ModifierWrappers() {
        const container = document.getElementById('sentence-container');
        container.innerHTML = '';
        container.classList.remove('mist-mode');

        let modifierMap = {};
        runtimeEngineData.modifiers.forEach(mod => {
            mod.tokenIds.forEach(id => { modifierMap[id] = mod; });
        });

        let currentWrapper = null;
        let currentModId = null;

        runtimeEngineData.tokens.forEach(token => {
            const matchedMod = modifierMap[token.id];
            if (matchedMod) {
                if (currentModId !== matchedMod.id) {
                    currentModId = matchedMod.id;
                    currentWrapper = document.createElement('div');
                    currentWrapper.className = 'modifier-wrapper';
                    
                    const btn = document.createElement('button');
                    btn.className = 'collapse-btn';
                    btn.innerText = '-';
                    
                    const placeholder = document.createElement('span');
                    placeholder.className = 'collapsed-text';
                    placeholder.innerText = '修饰成分/N2语法点';

                    const targetWrapper = currentWrapper;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        targetWrapper.classList.toggle('collapsed');
                        btn.innerText = targetWrapper.classList.contains('collapsed') ? '+' : '-';
                        
                        const totalWrappers = document.querySelectorAll('.modifier-wrapper').length;
                        const collapsedWrappers = document.querySelectorAll('.modifier-wrapper.collapsed').length;
                        if (collapsedWrappers === totalWrappers) {
                            document.getElementById('next-stage-btn').style.display = 'block';
                            showToast("修饰全折叠！阅读压力直降为零！");
                        }
                    };

                    currentWrapper.appendChild(btn);
                    currentWrapper.appendChild(placeholder);
                    container.appendChild(currentWrapper);
                }
                const span = document.createElement('span');
                span.className = 'word-token';
                span.innerText = token.text;
                currentWrapper.appendChild(span);
            } else {
                currentModId = null;
                currentWrapper = null;
                const span = document.createElement('span');
                span.className = 'word-token';
                if (runtimeEngineData.predicates.includes(token.id)) span.classList.add('predicate-marked');
                if (runtimeEngineData.stems.includes(token.id)) span.classList.add('main-stem');
                span.innerText = token.text;
                container.appendChild(span);
            }
        });
    }

    function buildStage4TranslationBlocks() {
        const transContainer = document.getElementById('translation-container');
        const blocksArea = document.getElementById('blocks-area');
        blocksArea.style.display = 'flex';

        let slotsHtml = "";
        runtimeEngineData.modifiers.forEach(mod => {
            slotsHtml += `<span class="trans-slot" id="slot-${mod.id}">（空缺片段）</span>`;
        });
        transContainer.innerHTML = `<div class="slots-container">${slotsHtml}。</div>`;

        const shuffledModifiers = [...runtimeEngineData.modifiers].sort(() => Math.random() - 0.5);
        blocksArea.innerHTML = '';
        
        shuffledModifiers.forEach(mod => {
            const block = document.createElement('div');
            block.className = 'translation-block';
            block.innerText = mod.cn;
            block.onclick = () => {
                if (block.classList.contains('used')) return;
                const slot = document.getElementById(`slot-${mod.id}`);
                if (slot) {
                    slot.innerText = mod.cn;
                    slot.style.borderBottom = 'none';
                    block.classList.add('used');
                    placedBlocks.push(mod.id);
                    
                    if (placedBlocks.length === runtimeEngineData.modifiers.length) {
                        setTimeout(() => {
                            transContainer.innerHTML = `
                                <div style="font-size: 17px; border-left: 4px solid var(--success); padding-left: 15px; line-height:1.8;">
                                    ${currentTask.translation.replace(currentTask.grammar, `<span class="grammar-highlight">${currentTask.grammar}</span>`)}
                                </div>
                            `;
                            blocksArea.style.display = 'none';
                            document.getElementById('instruction').innerHTML = `🎉 <b>全句破译完成！</b> 核心N2语法：<span class="grammar-highlight">${currentTask.grammar}</span> 运用成功！`;
                            showToast("通关！这句长难句已经被你彻底拿捏！");
                        }, 500);
                    }
                }
            };
            blocksArea.appendChild(block);
        });
    }

    // 🚀 核心优化：动态优雅地加载同目录下的本地 JSON 文件
    window.onload = () => {
        fetch('deepseek_json_20260625_d1c93f.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('网络响应状态不正常: ' + response.statusText);
                }
                return response.json();
            })
            .then(data => {
                itemBank = data;
                buildSidebarMenu();
                if(itemBank.length > 0) {
                    loadTaskById(itemBank[0].id); // 载入第一题
                }
            })
            .catch(error => {
                console.error('加载题库失败:', error);
                document.getElementById('instruction').innerHTML = "❌ <span style='color:red;'>数据加载失败！请确保题库 JSON 文件和网页在同级目录并已成功推送到仓库。</span>";
            });
    };
</script>

</body>
</html>
