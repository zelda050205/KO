<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学前儿童游戏 · 复习宝典（精析版）</title>
    <style>
        /* ===== 全局重置 & 莫兰迪色 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --primary: #b8a9c9;
            --primary-light: #d5cce6;
            --primary-dark: #9a87b0;
            --secondary: #c4b5a0;
            --accent: #c9a9a6;
            --accent-light: #e3cecb;
            --blue: #a8b5c0;
            --blue-light: #d0d9e0;
            --green: #b5c4b1;
            --green-light: #d7e2d4;
            --text: #4a4a4a;
            --text-light: #7a7a7a;
            --shadow: rgba(160, 140, 130, 0.15);
            --radius: 18px;
            --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px 28px;
            box-shadow: 0 4px 20px var(--shadow);
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--primary-dark), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 small {
            font-size: 14px;
            font-weight: 400;
            -webkit-text-fill-color: var(--text-light);
            background: none;
        }

        .stats {
            display: flex;
            gap: 24px;
            font-size: 14px;
            color: var(--text-light);
            align-items: center;
        }
        .stats span {
            background: var(--bg);
            padding: 6px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stats .num {
            font-weight: 700;
            color: var(--primary-dark);
            font-size: 18px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 18px 12px 44px;
            border: none;
            border-radius: 40px;
            background: var(--card-bg);
            box-shadow: 0 2px 12px var(--shadow);
            font-size: 15px;
            transition: var(--transition);
            outline: none;
            color: var(--text);
        }
        .search-box input:focus {
            box-shadow: 0 4px 20px rgba(184, 169, 201, 0.25);
        }
        .search-box .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.5;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            background: var(--card-bg);
            color: var(--text-light);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 2px 8px var(--shadow);
        }
        .filter-btn:hover {
            transform: translateY(-2px);
        }
        .filter-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px rgba(184, 169, 201, 0.35);
        }
        .filter-btn.important {
            background: var(--accent-light);
            color: var(--text);
        }
        .filter-btn.important.active {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary {
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(184, 169, 201, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(184, 169, 201, 0.4);
        }
        .btn-primary.outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            box-shadow: none;
        }
        .btn-primary.outline:hover {
            background: var(--primary);
            color: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-top: 8px;
        }

        .card {
            perspective: 1200px;
            height: 280px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: var(--radius);
            padding: 22px 24px;
            background: var(--card-bg);
            box-shadow: 0 4px 20px var(--shadow);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .card-face::-webkit-scrollbar {
            width: 4px;
        }
        .card-face::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 4px;
        }

        .card-front {
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 10px;
        }
        .card-front .badge {
            font-size: 11px;
            padding: 4px 14px;
            border-radius: 20px;
            background: var(--primary-light);
            color: var(--primary-dark);
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .card-front .badge.important {
            background: var(--accent-light);
            color: #b06a66;
        }
        .card-front .badge.mastered {
            background: var(--green-light);
            color: #5f7a5a;
        }
        .card-front h3 {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text);
        }
        .card-front .hint {
            font-size: 13px;
            color: var(--text-light);
            opacity: 0.7;
            margin-top: 4px;
        }
        .card-front .flip-icon {
            font-size: 28px;
            opacity: 0.3;
            transition: var(--transition);
        }
        .card:hover .flip-icon {
            opacity: 0.7;
            transform: scale(1.1);
        }

        .card-back {
            transform: rotateY(180deg);
            justify-content: flex-start;
            align-items: flex-start;
            text-align: left;
            background: var(--card-bg);
            border-left: 4px solid var(--primary-light);
        }
        .card-back .back-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .card-back .back-body {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text);
            flex: 1;
            overflow-y: auto;
            width: 100%;
        }
        .card-back .back-body ul {
            padding-left: 20px;
            margin: 6px 0;
        }
        .card-back .back-body li {
            margin-bottom: 3px;
        }
        .card-back .back-body strong {
            color: var(--primary-dark);
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .card-actions button {
            border: none;
            background: var(--bg);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .card-actions button:hover {
            background: var(--primary-light);
            color: var(--primary-dark);
        }
        .card-actions .master-btn.mastered {
            background: var(--green-light);
            color: #3d6b3a;
        }

        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty .big {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* ===== 自测模态 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(60, 50, 45, 0.5);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: var(--card-bg);
            border-radius: var(--radius);
            max-width: 760px;
            width: 100%;
            max-height: 90vh;
            padding: 32px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
            position: relative;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
            transition: var(--transition);
        }
        .modal-close:hover {
            transform: rotate(90deg);
            color: var(--text);
        }
        .modal h2 {
            font-size: 22px;
            margin-bottom: 6px;
            color: var(--primary-dark);
        }
        .modal .sub {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal .question {
            font-size: 18px;
            font-weight: 500;
            padding: 16px 0 12px;
            border-top: 2px dashed var(--bg);
            margin-top: 8px;
        }
        .modal .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 12px 0 16px;
        }
        .modal .options label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            background: var(--bg);
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            font-size: 15px;
        }
        .modal .options label:hover {
            background: var(--primary-light);
            border-color: var(--primary-light);
        }
        .modal .options input[type="radio"] {
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .modal .options label.correct {
            background: var(--green-light);
            border-color: var(--green);
        }
        .modal .options label.wrong {
            background: var(--accent-light);
            border-color: var(--accent);
        }
        .modal .result-box {
            padding: 14px 18px;
            border-radius: 12px;
            margin: 12px 0 16px;
            font-size: 15px;
            line-height: 1.7;
            display: none;
        }
        .modal .result-box.show {
            display: block;
        }
        .modal .result-box.correct {
            background: var(--green-light);
            border-left: 4px solid var(--green);
        }
        .modal .result-box.wrong {
            background: var(--accent-light);
            border-left: 4px solid var(--accent);
        }
        .modal .progress-text {
            font-size: 14px;
            color: var(--text-light);
            text-align: center;
            margin-top: 16px;
        }

        .modal .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
            justify-content: center;
        }

        .explanation-details {
            margin-top: 10px;
            padding: 12px 16px;
            background: #faf8f5;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            font-size: 14px;
            line-height: 1.8;
        }
        .explanation-details strong {
            color: var(--primary-dark);
        }
        .explanation-details .opt-item {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin: 2px 0;
        }
        .explanation-details .opt-item .mark {
            font-weight: 700;
            margin-right: 4px;
        }
        .explanation-details .opt-item .mark.correct-mark {
            color: #3d7a3a;
        }
        .explanation-details .opt-item .mark.wrong-mark {
            color: #b06a66;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 6px;
        }

        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                padding: 16px 18px;
            }
            .header h1 {
                font-size: 20px;
            }
            .stats {
                gap: 12px;
                flex-wrap: wrap;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .card {
                height: 260px;
            }
            .modal {
                padding: 24px 20px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                justify-content: center;
            }
        }

        .tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 12px;
            border-radius: 12px;
            background: var(--blue-light);
            color: #5a7a8a;
            font-weight: 500;
        }
        .tag.green {
            background: var(--green-light);
            color: #4d6b48;
        }
        .tag.pink {
            background: var(--accent-light);
            color: #a06a66;
        }
        .tag.purple {
            background: var(--primary-light);
            color: #7a6a8a;
        }

        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(-20px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <header class="header">
            <h1>
                📚 学前儿童游戏
                <small>精析版 · 每题都讲透</small>
            </h1>
            <div class="stats">
                <span>📖 总 <span class="num" id="totalCount">0</span></span>
                <span>⭐ 重点 <span class="num" id="importantCount">0</span></span>
                <span>✅ 已掌握 <span class="num" id="masteredCount">0</span></span>
                <button class="btn-primary outline" id="quizBtn" style="padding:6px 18px;font-size:13px;">
                    🧠 自测（精析版）
                </button>
            </div>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <span class="icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索知识点..." />
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn important" data-filter="important">⭐ 重点</button>
                <button class="filter-btn" data-filter="游戏导论">📖 导论</button>
                <button class="filter-btn" data-filter="角色游戏">🎭 角色</button>
                <button class="filter-btn" data-filter="表演游戏">🎪 表演</button>
                <button class="filter-btn" data-filter="结构游戏">🧱 结构</button>
                <button class="filter-btn" data-filter="体育游戏">🏃 体育</button>
                <button class="filter-btn" data-filter="智力游戏">🧩 智力</button>
                <button class="filter-btn" data-filter="其他游戏">🎨 其他</button>
            </div>
        </div>

        <div class="grid" id="cardGrid"></div>
    </div>

    <!-- 自测模态 -->
    <div class="modal-overlay" id="quizModal">
        <div class="modal">
            <button class="modal-close" id="quizClose">✕</button>
            <h2>🧠 自测模式 · 每题精析</h2>
            <div class="sub">选择后查看详细解析，理解每个选项为什么对或错</div>
            <div id="quizContent">
                <div class="progress-text" id="quizProgress">第 1 / 10 题</div>
                <div class="question" id="quizQuestion">加载中...</div>
                <div class="options" id="quizOptions"></div>
                <div class="result-box" id="quizResult"></div>
                <div class="btn-row">
                    <button class="btn-primary" id="quizNext">下一题 →</button>
                    <button class="btn-primary outline" id="quizReset">🔄 重新开始</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  1. 知识点数据（含详细解析）
        // ============================================================
        const data = [{
            id: 1,
            category: '游戏导论',
            title: '幼儿游戏与成人游戏的根本区别',
            content: `① <strong>地位不同</strong>：幼儿“游戏即生活”，游戏是幼儿一日生活中的基本活动形式；成人游戏只是相对次要的部分。<br>
                    ② <strong>心理状态不同</strong>：幼儿缺乏泾渭分明的“界线意识”，常在游戏中有在日常生活中的朦胧感；成人意识明确，能清晰区分游戏与非游戏。<br>
                    ③ <strong>内容不同</strong>：幼儿游戏多为隐性规则的自然游戏，获得本能性、原始性乐趣；成人多为强规则、竞技性游戏。<br>
                    ④ <strong>驱动力不同</strong>：幼儿驱动力直接内在，“为了游戏而游戏”；成人多有外在功利性动机。<br>
                    ⑤ <strong>价值功能不同</strong>：幼儿游戏具有探索、求知、发育身心的重要作用；成人游戏则不再具有此功能。`,
            important: true,
            quiz: {
                question: '以下哪项不属于幼儿游戏与成人游戏的根本区别？',
                options: [
                    'A. 游戏在各自生活中的地位不同，幼儿“游戏即生活”',
                    'B. 游戏的心理状态不同，幼儿缺乏界线意识',
                    'C. 游戏的内容不同，幼儿游戏多为强规则',
                    'D. 游戏的驱动力不同，幼儿是内在直接驱动'
                ],
                correct: 'C',
                explanation: `✅ <strong>正确选项：C</strong> —— 幼儿游戏与成人游戏在内容上的区别恰恰相反：幼儿游戏多为“隐性规则”的自然游戏，成人游戏则多为“强规则”的竞技性游戏。因此C项表述错误。<br><br>
                <strong>逐项解析：</strong><br>
                <span class="opt-item"><span class="mark correct-mark">✔ A</span> 地位不同：幼儿游戏是基本活动，成人游戏是次要部分，正确。</span><br>
                <span class="opt-item"><span class="mark correct-mark">✔ B</span> 心理状态不同：幼儿界限模糊，成人界限清晰，正确。</span><br>
                <span class="opt-item"><span class="mark wrong-mark">✘ C</span> 内容不同：幼儿多隐性规则，成人多强规则，该项说反了，错误。</span><br>
                <span class="opt-item"><span class="mark correct-mark">✔ D</span> 驱动力不同：幼儿内在直接，成人有外在功利性，正确。</span>`
            }
        }, {
            id: 2,
            category: '游戏导论',
            title: '幼儿游戏的基本特征',
            content: `① <strong>“兴趣主义”的活动</strong>：幼儿是天生的“兴趣主义者”，活动受情绪化的兴趣支配，活泼好动。<br>
                    ② <strong>“自发性的自主”活动</strong>：由情感冲动引起，是“我要玩”而不是“要我玩”，游戏过程绝对自控，不服从外部压力。<br>
                    ③ <strong>“重过程”的自娱活动</strong>：从“重过程不重结果”发展到“过程与结果并重”，专注的是饶有趣味的游戏本身。`,
            important: true,
            quiz: {
                question: '幼儿游戏的基本特征不包括以下哪项？',
                options: [
                    'A. “兴趣主义”的活动',
                    'B. “自发性的自主”活动',
                    'C. “重过程”的自娱活动',
                    'D. “强目标”的结果导向活动'

        function getCategoryTag(cat) {

                if (filter === 'all') return true;

        // ============================================================

        function generateQuiz() {
            const importantItems = fullData.filter(d => d.important);
            const normalItems = fullData.filter(d => !d.important);
            let pool = [...importantItems];
            if (pool.length < state.quizTotal) {
                const shuffledNormal = [...normalItems].sort(() => Math.random() - 0.5);
                pool = pool.concat(shuffledNormal.slice(0, state.quizTotal - pool.length));
            } else {
                pool = pool.sort(() => Math.random() - 0.5).slice(0, state.quizTotal);
            }
            while (pool.length < state.quizTotal) {
                const extra = fullData.filter(d => !pool.includes(d));
                if (extra.length === 0) break;
                pool.push(extra[Math.floor(Math.random() * extra.length)]);
            }

            state.quizItems = pool.map(item => {
                const q = item.quiz;
                let options = q.options;
                let correct = q.correct;
                let explanation = q.explanation || '（详细解析请参考卡片中的书本原话）';
                // 如果存在_rawOptions，进行匹配
                if (q._rawOptions) {
                    const idx = q._rawOptions.indexOf(q._correctText);
                    if (idx !== -1) {
                        options = q._rawOptions.map((t, i) => String.fromCharCode(65 + i) + '. ' + t);
                        correct = options[idx];
                    }
                }
                return {
                    id: item.id,
                    title: item.title,
                    question: q.question || `关于“${item.title}”，以下哪项与书中一致？`,

                    correct: correct,
                    explanation: explanation,
                    content: item.content,
                    category: item.category
                };
            });

            state.quizIndex = 0;
            state.quizAnswered = false;
            showQuizQuestion();
        }

        function showQuizQuestion() {
            const items = state.quizItems;

                quizNext.textContent = '🏁 完成';
                return;
            }

            const q = items[state.quizIndex];
            quizQuestion.textContent = q.question;

                    if (!explanationHtml.includes('逐项解析')) {
                        explanationHtml = `<strong>${isCorrect ? '✅ 回答正确！' : '❌ 回答错误'}</strong><br>正确答案是：「${q.correct}」<br><br>` +
                            explanationHtml;
                    } else {
                        explanationHtml = `<strong>${isCorrect ? '✅ 回答正确！' : '❌ 回答错误'}</strong><br><br>` +

                const correctCount = document.querySelectorAll('.options label.correct').length;
                quizQuestion.textContent = `🎉 自测完成！正确率：${correctCount}/${total}`;
                quizOptions.innerHTML = '';
                quizResult.className = 'result-box show correct';
                quizResult.innerHTML = `
                    <strong>${correctCount === total ? '🌟 太棒了！全部答对！' : '💪 继续加油！'}</strong><br>
                    <span style="font-size:14px;color:var(--text-light);">
                        ${correctCount === total ? '你已完全掌握书本优质回答！' : `答对了 ${correctCount} 题，再翻看卡片巩固一下吧。`}
                    </span>
                `;
                quizProgress.textContent = `已完成 ${total} / ${total} 题`;
                quizNext.textContent = '🏁 完成';
                return;
            }
            showQuizQuestion();
        }

        // ============================================================
        //  7. 自测模态控制
        // ============================================================
        quizBtn.addEventListener('click', function() {
            generateQuiz();
            quizModal.classList.add('open');
        });

        quizClose.addEventListener('click', function() {
            quizModal.classList.remove('open');
        });

        quizModal.addEventListener('click', function(e) {
            if (e.target === this) quizModal.classList.remove('open');
        });

        quizNext.addEventListener('click', nextQuiz);

        quizReset.addEventListener('click', function() {
            generateQuiz();
            document.querySelectorAll('.options label').forEach(l => {
                l.classList.remove('correct', 'wrong');
            });
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && quizModal.classList.contains('open')) {
                nextQuiz();
            }
            if (e.key === 'Escape' && quizModal.classList.contains('open')) {
                quizModal.classList.remove('open');
            }
        });

        // ============================================================
        //  8. 初始化
        // ============================================================
        applyFilters();

        // 彩蛋
        document.querySelector('.stats .num#masteredCount')?.addEventListener('click', function() {
            if (state.mastered.size === 0) return;
            createConfetti();
        });

        function createConfetti() {
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);
            const colors = ['#c9a9a6', '#b8a9c9', '#a8b5c0', '#b5c4b1', '#e3cecb', '#d5cce6'];
            for (let i = 0; i < 60; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (Math.random() * 8 + 4) + 'px';
                el.style.height = (Math.random() * 8 + 4) + 'px';
                el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                el.style.animationDelay = (Math.random() * 1.2) + 's';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                container.appendChild(el);
            }
            setTimeout(() => container.remove(), 3500);
        }

        console.log('📚 学前儿童游戏 · 复习宝典（精析版）已加载！');
        console.log(`📖 共 ${fullData.length} 个知识点，每道题都配有详细解析。`);
    </script>

</body>
</html>
